<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Registration System</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <!-- HEADER -->
  <header class="bg-blue-600 text-white text-center py-6 shadow-lg">
    <h1 class="text-3xl font-bold">Student Registration System</h1>
    <p class="text-sm mt-2">Manage student records with ease!</p>
  </header>

  <!-- MAIN CONTENT -->
  <main class="max-w-5xl mx-auto p-4">

    <!-- STUDENT FORM SECTION -->
    <section aria-labelledby="form-heading">
      <h2 id="form-heading" class="sr-only">Student Form</h2>

      <form id="studentForm" class="bg-white p-6 rounded-xl shadow-md mb-6 space-y-4">

        <div class="grid md:grid-cols-2 gap-4">

          <label class="sr-only" for="name">Student Name</label>
          <input type="text" id="name" placeholder="Student Name"
            class="border p-3 rounded-lg w-full focus:outline-blue-500" required>

          <label class="sr-only" for="studentId">Student ID</label>
          <input type="text" id="studentId" placeholder="Student ID"
            class="border p-3 rounded-lg w-full focus:outline-blue-500" required>

          <label class="sr-only" for="email">Email</label>
          <input type="email" id="email" placeholder="Email ID"
            class="border p-3 rounded-lg w-full focus:outline-blue-500" required>

          <label class="sr-only" for="contact">Contact Number</label>
          <input type="text" id="contact" placeholder="Contact Number"
            class="border p-3 rounded-lg w-full focus:outline-blue-500" required>

        </div>

        <button
          class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
          Add / Update Student
        </button>
      </form>
    </section>

    <!-- TABLE SECTION -->
    <section aria-labelledby="table-heading">
      <h2 id="table-heading" class="sr-only">Student Records</h2>

      <div class="bg-white rounded-xl shadow-md overflow-hidden">
        <div class="max-h-64 overflow-y-auto">

          <table class="w-full text-sm text-center">
            <caption class="sr-only">List of registered students</caption>

            <thead class="bg-blue-600 text-white sticky top-0">
              <tr>
                <th scope="col" class="p-3">Name</th>
                <th scope="col" class="p-3">ID</th>
                <th scope="col" class="p-3">Email</th>
                <th scope="col" class="p-3">Contact</th>
                <th scope="col" class="p-3">Actions</th>
              </tr>
            </thead>

            <tbody id="tableBody" class="text-gray-700"></tbody>

          </table>

        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="text-center text-sm text-gray-500 py-4">
    © 2026 Student Management System | Built by Gitansh
  </footer>

  <script src="main.js"></script>

</body>
</html>
